spring.application.name=cloud-file-storage
spring.datasource.url=jdbc:postgresql://localhost:5432/clouddb
spring.datasource.username=cloudfile
spring.datasource.password=cloudfile
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.data.redis.database=0
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=cloudfile
spring.data.redis.timeout=6380
spring.session.store-type=redis
minio.endpoint=http://localhost:9222
minio.bucket=cloudfile
minio.access-key=root
minio.secret-key=rootpass123
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB