services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_continer
    restart: unless-stopped
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: cloudfile
      POSTGRES_PASSWORD: cloudfile
      POSTGRES_DB: clouddb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_container
    command: redis-server --requirepass cloudfile
    ports:
      - "6380:6379"
    volumes:
      - ./redisdata:/data

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=rootpass123
    volumes:
      - minio-volume:/data
    ports:
      - "9222:9000"
      - "9223:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
volumes:
  postgres_data:
  minio-volume: